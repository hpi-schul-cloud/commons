name: Test

on: [push]

jobs:
  test:
    name: test

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - run: npm ci --prefer-offline --no-audit
    - run: npm run build --if-present
    - run: npm test
